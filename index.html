<div class="calculators-container">
    <script>
        for(let i=1; i<=2; i++) {
            document.write(`
            <div class="calculator-card" id="calc-${i}">
                <div class="card-header-row">
                    <input type="text" class="header-input" placeholder="Tapahtumalohko ${i}...">
                    <button class="reset-card-btn" onclick="resetCard(${i})" title="Nollaa kortti">⟲</button>
                </div>
                
                <div class="time-section">
                    <label>Aloitusaika</label>
                    <div class="time-row">
                        <input type="time" class="t1">
                        <button class="now-btn" onclick="setNow(this, 't1')">Nyt</button>
                    </div>
                </div>

                <div class="event-input-group">
                    <div class="event-input-row">
                        <input type="time" class="event-time">
                        <input type="text" class="event-text" placeholder="Tapahtuma...">
                        <button class="add-txt-btn" onclick="addEventText(this)">+txt</button>
                    </div>
                    <div class="event-list"></div>
                </div>

                <div class="time-section">
                    <label>Lopetusaika</label>
                    <div class="time-row">
                        <input type="time" class="t2">
                        <button class="now-btn" onclick="setNow(this, 't2')">Nyt</button>
                    </div>
                </div>

                <div class="result-area">
                    <span class="diff-label">Kesto</span>
                    <div class="diff-value result">0 min</div>
                </div>

                <button class="save-btn" onclick="saveResult(this)">💾 Tallenna lokiin</button>
            </div>
            `);
        }
    </script>

    <div class="calculator-card special-card" id="calc-3">
        <div class="card-header-row">
            <input type="text" class="header-input" placeholder="Aikalaskin (Aloitus + Kesto)...">
            <button class="reset-card-btn" onclick="resetCard(3)">⟲</button>
        </div>
        
        <div class="time-section">
            <label>Aloitusaika</label>
            <div class="time-row">
                <input type="time" class="t-start" oninput="calculateEndTime()">
                <button class="now-btn" onclick="setNowSpecial()">Nyt</button>
            </div>
        </div>

        <div class="time-section">
            <label>Kesto (minuuttia)</label>
            <input type="number" class="duration-input" placeholder="esim. 300" oninput="calculateEndTime()" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1.1rem;">
        </div>

        <div class="result-area" style="border-color: var(--primary-color);">
            <span class="diff-label">Arvioitu lopetusaika</span>
            <div class="diff-value end-result">--:--</div>
        </div>
        <p style="font-size: 0.8rem; color: #64748b; text-align: center;">Tämä kortti on vain laskentaa varten.</p>
    </div>
</div>
