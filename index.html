<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIRV tapahtumaloki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2d5a27">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div id="update-banner" onclick="window.location.reload()">Päivitys saatavilla! Klikkaa tästä.</div>

<div class="main-header">
    <h1>HIRV tapahtumaloki</h1>
    <button class="reset-all-btn" onclick="resetEverything()" title="Nollaa kaikki">⟲</button>
</div>

/* MUISTA PÄIVITTÄÄ VERSIO vs SW.JS */
<div class="version-tag">Versio 1.0.12 (SW: v12)</div>

<div class="calculators-container">
    <script>
        for(let i=1; i<=2; i++) {
            document.write(`
            <div class="calculator-card" id="calc-${i}">
                <div class="card-header-row">
                    <input type="text" class="header-input" placeholder="Tapahtumalohko ${i}...">
                    <button class="reset-card-btn" onclick="resetCard(${i})" title="Nollaa kortti">⟲</button>
                </div>
                
                <div class="time-section">
                    <label>Aloitusaika</label>
                    <div class="time-row">
                        <input type="time" class="t1">
                        <button class="now-btn" onclick="setNow(this, 't1')">Nyt</button>
                    </div>
                </div>

                <div class="event-input-group">
                    <div class="event-input-row">
                        <input type="time" class="event-time">
                        <input type="text" class="event-text" placeholder="Tapahtuma...">
                        <button class="add-txt-btn" onclick="addEventText(this)">+txt</button>
                    </div>
                    <div class="event-list"></div>
                </div>

                <div class="time-section">
                    <label>Lopetusaika</label>
                    <div class="time-row">
                        <input type="time" class="t2">
                        <button class="now-btn" onclick="setNow(this, 't2')">Nyt</button>
                    </div>
                </div>

                <div class="result-area">
                    <span class="diff-label">Kesto</span>
                    <div class="diff-value result">0 min</div>
                </div>

                <button class="save-btn" onclick="saveResult(this)">💾 Tallenna lokiin</button>
            </div>
            `);
        }
    </script>

    <div class="calculator-card special-card" id="calc-3">
        <div class="card-header-row">
            <input type="text" class="header-input" placeholder="Aikalaskin (Aloitus + Kesto)...">
            <button class="reset-card-btn" onclick="resetCard(3)">⟲</button>
        </div>
        
        <div class="time-section">
            <label>Aloitusaika</label>
            <div class="time-row">
                <input type="time" class="t-start" oninput="calculateEndTime()">
                <button class="now-btn" onclick="setNowSpecial()">Nyt</button>
            </div>
        </div>

        <div class="time-section">
            <label>Kesto (minuuttia)</label>
            <input type="number" class="duration-input" placeholder="esim. 300" oninput="calculateEndTime()" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1.1rem;">
        </div>

        <div class="result-area" style="border-color: var(--primary-color);">
            <span class="diff-label">Lopetusaika</span>
            <div class="diff-value end-result">--:--</div>
        </div>
        <p style="font-size: 0.8rem; color: #64748b; text-align: center;">Vain laskentaan, ei tallennu lokiin.</p>
    </div>
</div>

<div class="history-container">
    <div class="history-header">
        <h3>Tapahtumaloki (Aikajärjestys)</h3>
        <button class="copy-all-btn" onclick="copyAllToClipboard()">📋 Kopioi kaikki</button>
    </div>
    <div id="history-list"></div>
    <button class="danger-link" onclick="clearHistory()">Tyhjennä historia</button>
</div>

<div id="toast" class="toast">Kopioitu!</div>

<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Tarkistetaan päivitykset heti kun sivu ladataan
            reg.update();

            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    // Jos uusi SW on asennettu ja vanha on jo hallinnassa (controller)
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        const banner = document.getElementById('update-banner');
                        if (banner) banner.style.display = 'block';
                    }
                });
            });
        });
    });
}
</script>

</body>
</html>
